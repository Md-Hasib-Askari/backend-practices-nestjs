<header>

<script>
const L=[
{id:1,level:'beginner',title:'How CSRF attacks work',sub:'Attack anatomy, why cookies are the problem, threat model',
concept:'CSRF tricks a victim\'s browser into making authenticated requests to your API from a malicious site. Because browsers automatically attach cookies, evil.com can POST to your-api.com/transfer and the request arrives with the victim\'s session cookie. CSRF only affects cookie-based auth — JWT in Authorization headers is naturally immune.',
warn:'CSRF does NOT affect APIs using JWT in Authorization: Bearer headers. It only matters when you use cookies (session cookies or httpOnly JWT cookies).',
code:`<span class="cm">/* The attack in plain terms */</span>

<span class="cm">// 1. Victim is logged into bank.com — has session cookie</span>
<span class="cm">// 2. Victim visits evil.com which has this hidden form:</span>

&lt;form action=<span class="str">"https://bank.com/transfer"</span> method=<span class="str">"POST"</span>&gt;
  &lt;input name=<span class="str">"amount"</span> value=<span class="str">"10000"</span> /&gt;
  &lt;input name=<span class="str">"to"</span>     value=<span class="str">"attacker"</span> /&gt;
&lt;/form&gt;
&lt;script&gt;document.forms[<span class="nl">0</span>].submit()&lt;/script&gt;

<span class="cm">// 3. Browser sends POST to bank.com WITH the session cookie</span>
<span class="cm">// 4. bank.com processes the transfer — victim loses money</span>

<span class="cm">// Who needs CSRF protection?</span>
<span class="cm">// ✓ Session cookie auth    ✓ httpOnly JWT cookie</span>
<span class="cm">// ✗ JWT in Authorization header (safe by default)</span>`,
ex:{title:'Exercise 1 — demonstrate the vulnerability',body:'Build a tiny demo: a NestJS app with cookie-based session login and a POST /transfer endpoint. Then build a simple evil.html that auto-submits to it. Observe the attack succeeds before you add protection.',
steps:['Create POST /auth/login that sets a session cookie with express-session','Create POST /transfer that reads req.session.userId (no CSRF check yet)','Build evil.html with an auto-submitting hidden form pointing to POST /transfer','Open evil.html in a browser while logged in — confirm the transfer executes','Document what you observed — this is the baseline you will fix']}},

{id:2,level:'beginner',title:'CSRF tokens with csurf (synchronizer pattern)',sub:'csurf middleware, _csrf token, double-submit, SameSite',
concept:'The synchronizer token pattern: the server generates a unique secret per session, embeds it in responses as a token, and requires it back on every state-changing request. An attacker on evil.com cannot read this token from your domain (same-origin policy blocks it).',
warn:'The csurf npm package is deprecated. Use csrf-csrf or nestjs-csrf for modern NestJS projects. The pattern is identical — only the package differs.',
code:`npm install csrf-csrf cookie-parser
npm install -D @types/cookie-parser

<span class="cm">// main.ts — wire up CSRF middleware</span>
<span class="kw">import</span> cookieParser <span class="kw">from</span> <span class="str">'cookie-parser'</span>;
<span class="kw">import</span> { doubleCsrf } <span class="kw">from</span> <span class="str">'csrf-csrf'</span>;

<span class="kw">const</span> { generateToken, doubleCsrfProtection } = <span class="fn">doubleCsrf</span>({
  getSecret: () => process.env.CSRF_SECRET,
  cookieName: <span class="str">'__Host-psifi.x-csrf-token'</span>,
  cookieOptions: { secure: <span class="kw">true</span>, sameSite: <span class="str">'strict'</span> },
});

app.<span class="fn">use</span>(cookieParser());
app.<span class="fn">use</span>(doubleCsrfProtection); <span class="cm">// validates token on POST/PUT/PATCH/DELETE</span>

<span class="cm">// Controller: send token to client</span>
<span class="dec">@Get</span>(<span class="str">'csrf-token'</span>)
<span class="fn">getCsrfToken</span>(<span class="dec">@Req</span>() req, <span class="dec">@Res</span>() res) {
  <span class="kw">return</span> res.<span class="fn">json</span>({ token: <span class="fn">generateToken</span>(req, res) });
}`,
ex:{title:'Exercise 2 — protect the transfer endpoint',body:'Add csrf-csrf to your demo app. Fetch the CSRF token first, then include it as x-csrf-token header on POST /transfer. Verify that requests without the token get 403.',
steps:['Install csrf-csrf and cookie-parser','Configure doubleCsrf in main.ts with a CSRF_SECRET in .env','Add GET /csrf-token endpoint that calls generateToken(req, res)','Update your frontend to fetch the token first, then include it as a header','Try POST /transfer without the token — expect 403 Forbidden','Try with the token — expect 200 OK']}},

{id:3,level:'beginner',title:'SameSite cookies as a CSRF defence',sub:'SameSite=Strict, Lax, None — what each means',
concept:'SameSite is a cookie attribute that tells browsers when to send cookies on cross-origin requests. SameSite=Strict: never on cross-site requests (strongest). SameSite=Lax: sent on top-level navigations only (safe default). SameSite=None: always sent (requires Secure). Modern browsers default to Lax, which defeats most CSRF attacks without CSRF tokens.',
code:`<span class="cm">// Session cookie with SameSite=Strict</span>
app.<span class="fn">use</span>(session({
  secret: process.env.SESSION_SECRET,
  cookie: {
    httpOnly: <span class="kw">true</span>,      <span class="cm">// no JS access</span>
    secure: <span class="kw">true</span>,        <span class="cm">// HTTPS only</span>
    sameSite: <span class="str">'strict'</span>,  <span class="cm">// never on cross-origin requests</span>
    maxAge: <span class="nl">86400000</span>,    <span class="cm">// 1 day</span>
  },
}));

<span class="cm">// SameSite quick reference:</span>
<span class="cm">// strict → cookie NEVER sent cross-site (safest)</span>
<span class="cm">// lax    → sent on top-level GET nav only (safe default)</span>
<span class="cm">// none   → always sent, requires Secure flag</span>

<span class="cm">// Defence-in-depth: use BOTH SameSite AND CSRF tokens</span>
<span class="cm">// SameSite=Strict alone is strong but not universally supported</span>`,
ex:{title:'Exercise 3 — inspect SameSite behaviour',body:'Set your session cookie to SameSite=Strict. Open DevTools → Application → Cookies and confirm the attribute is set. Retry the evil.html attack — the browser now blocks the cookie from being sent.',
steps:['Set sameSite: "strict" in your session cookie config','Restart the server and log in again (new cookie will be issued)','Open DevTools → Application → Cookies — confirm SameSite=Strict is shown','Retry evil.html auto-submit — open Network tab and observe: cookie is NOT sent','Try SameSite=Lax too — observe that top-level GET navigations still work but POST is blocked']}},

{id:4,level:'intermediate',title:'Content Security Policy fundamentals',sub:'CSP header, directives, violations, report-uri',
concept:'Content Security Policy is an HTTP response header that tells browsers which sources of content (scripts, styles, images, fonts, frames) are allowed. A well-configured CSP is your primary defence against XSS: even if an attacker injects a &lt;script&gt; tag, the browser refuses to execute it.',
code:`<span class="cm">// Helmet sets CSP headers automatically in NestJS</span>
npm install helmet

<span class="cm">// main.ts</span>
<span class="kw">import</span> helmet <span class="kw">from</span> <span class="str">'helmet'</span>;

app.<span class="fn">use</span>(helmet({
  contentSecurityPolicy: {
    directives: {
      defaultSrc:  [<span class="str">"'self'"</span>],
      scriptSrc:   [<span class="str">"'self'"</span>],          <span class="cm">// no inline scripts</span>
      styleSrc:    [<span class="str">"'self'"</span>, <span class="str">"'unsafe-inline'"</span>],
      imgSrc:      [<span class="str">"'self'"</span>, <span class="str">'data:'</span>, <span class="str">'https:'</span>],
      connectSrc:  [<span class="str">"'self'"</span>],
      fontSrc:     [<span class="str">"'self'"</span>, <span class="str">'https://fonts.gstatic.com'</span>],
      frameSrc:    [<span class="str">"'none'"</span>],           <span class="cm">// block all iframes</span>
      reportTo:    [<span class="str">'/csp-report'</span>],     <span class="cm">// collect violations</span>
    },
  },
}));`,
ex:{title:'Exercise 4 — configure and test CSP with helmet',body:'Add helmet with a strict CSP to your NestJS app. Verify the header appears in responses. Then deliberately break it (add an inline script to a served HTML page) and watch the browser block it.',
steps:['Install helmet and add ap p.use (helmet({...})) in main.ts','Start the app and open DevTools → Network — click any response and check for content-security-policy header','Serve a test HTML page with an inline <script>alert(1)<\/        script >','Open the page — observe the browser blocks the script and logs a CSP violation','Open DevTools → Console to see the violation message']}},

{id:5,level:'intermediate',title:'CSP violation reporting',sub:'report-to, report-uri, CSP report endpoint, monitoring',
concept:'CSP violations are reported by browsers to a specified endpoint. Collect these to discover: accidental policy breakage, third-party resource changes, and real XSS attack attempts. Use report-only mode first to audit without breaking anything.',
code:`<span class="cm">// 1. Collect violations — add a report endpoint</span>
<span class="dec">@Post</span>(<span class="str">'csp-report'</span>)
<span class="dec">@HttpCode</span>(<span class="nl">204</span>)
<span class="fn">cspReport</span>(<span class="dec">@Body</span>() body: <span class="kw">any</span>) {
  <span class="kw">this</span>.logger.<span class="fn">warn</span>(<span class="str">'CSP violation'</span>, body[<span class="str">'csp-report'</span>]);
  <span class="cm">// alert to Slack / store in DB for analysis</span>
}

<span class="cm">// 2. Report-only mode: observe without enforcing</span>
app.<span class="fn">use</span>(helmet({
  contentSecurityPolicy: {
    useDefaults: <span class="kw">true</span>,
    reportOnly: <span class="kw">true</span>,     <span class="cm">// sends header: Content-Security-Policy-Report-Only</span>
    directives: {
      defaultSrc: [<span class="str">"'self'"</span>],
      reportUri: <span class="str">'/csp-report'</span>,
    },
  },
}));

<span class="cm">// Workflow: report-only → fix violations → enforce</span>`,
ex:{title:'Exercise 5 — CSP report pipeline',body:'Switch to Content-Security-Policy-Report-Only mode. Add POST /csp-report that logs violations to the console. Trigger violations intentionally and observe the reports.',
steps:['Set reportOnly: true in helmet CSP config','Add POST /csp-report controller that logs req.body to console','Serve an HTML page with an inline <script> and an image from example.com','Open the page — violations appear in console without blocking anything','Read the violation JSON: document-uri, violated-directive, blocked-uri','Switch to enforcing mode (remove reportOnly) once you understand the violations']}},

{id:6,level:'intermediate',title:'All security headers with helmet',sub:'HSTS, X-Frame-Options, X-Content-Type, Referrer-Policy, CORP',
concept:'Beyond CSP, helmet sets a suite of security headers that harden browsers. Each header defends a specific attack vector. Understanding what each does (and why) lets you configure them precisely rather than blindly copying defaults.',
code:`app.<span class="fn">use</span>(helmet({
  <span class="cm">// HTTP Strict Transport Security: force HTTPS for 1 year</span>
  hsts: { maxAge: <span class="nl">31536000</span>, includeSubDomains: <span class="kw">true</span>, preload: <span class="kw">true</span> },

  <span class="cm">// Prevent clickjacking: disallow iframing your app</span>
  frameguard: { action: <span class="str">'deny'</span> },

  <span class="cm">// Stop MIME-type sniffing attacks</span>
  noSniff: <span class="kw">true</span>,

  <span class="cm">// Referrer: don't leak full URL to third parties</span>
  referrerPolicy: { policy: <span class="str">'strict-origin-when-cross-origin'</span> },

  <span class="cm">// Cross-Origin-Resource-Policy</span>
  crossOriginResourcePolicy: { policy: <span class="str">'same-origin'</span> },

  <span class="cm">// Cross-Origin-Opener-Policy: isolate browsing context</span>
  crossOriginOpenerPolicy: { policy: <span class="str">'same-origin'</span> },

  <span class="cm">// Permissions-Policy: disable dangerous browser features</span>
  permittedCrossDomainPolicies: { permittedPolicies: <span class="str">'none'</span> },
}));`,
ex:{title:'Exercise 6 — audit your security headers',body:'Apply the full helmet configuration above. Then use securityheaders.com to grade your running app. Aim for an A rating. Fix any headers that are missing or misconfigured.',
steps:['Apply the full helmet() config to main.ts','Use ngrok or similar to expose your local server publicly','Visit https://securityheaders.com and scan your URL','Read the report — understand each missing/failing header','Adjust helmet config to achieve an A rating','Note headers you had to relax (e.g. unsafe-inline for CSS) and document why']}},

{id:7,level:'advanced',title:'Nonce-based CSP for dynamic scripts',sub:'Per-request nonces, helmet nonce, Angular/React integration',
concept:'When you use a JavaScript framework that injects inline scripts (e.g. Next.js, Angular Universal), "unsafe-inline" in CSP is too permissive. The nonce approach generates a cryptographic random value per request, injects it into the CSP header AND your script tags. Only scripts with a matching nonce execute.',
code:`<span class="cm">// nonce.middleware.ts</span>
<span class="kw">import</span> { randomBytes } <span class="kw">from</span> <span class="str">'crypto'</span>;

<span class="dec">@Injectable</span>()
<span class="kw">export class</span> <span class="cl">NonceMiddleware</span> <span class="kw">implements</span> <span class="cl">NestMiddleware</span> {
  <span class="fn">use</span>(req: <span class="cl">Request</span>, res: <span class="cl">Response</span>, next: <span class="cl">NextFunction</span>) {
    res.locals.nonce = randomBytes(<span class="nl">16</span>).<span class="fn">toString</span>(<span class="str">'base64'</span>);
    next();
  }
}

<span class="cm">// main.ts — use nonce in CSP</span>
app.<span class="fn">use</span>((req, res, next) => {
  helmet({
    contentSecurityPolicy: {
      directives: {
        scriptSrc: [<span class="str">"'self'"</span>, () => <span class="str">\`'nonce-\${res.locals.nonce}'\`</span>],
      },
    },
  })(req, res, next);
});

<span class="cm">// Template: inject nonce into script tags</span>
<span class="cm">// &lt;script nonce="&lt;%= nonce %&gt;"&gt;...&lt;/script&gt;</span>`,
ex:{title:'Exercise 7 — nonce-based CSP for a server-rendered page',body:'Implement NonceMiddleware that generates a fresh nonce per request. Use it in the CSP header and inject it into a server-rendered HTML template. Verify that scripts with the nonce execute but others are blocked.',
steps:['Create  Nonc eMiddleware that sets res.locals.nonce = randomBytes(16).toString("base64")','Register it in AppModule.configure(consumer) for the routes that serve HTML','Use the nonce in scriptSrc: ["\'self\'", () => `\'nonce-${r        es.loc als.nonce}\'`]','Render a page with: <script nonce="<%= nonce %>">console.log("allowed")<\ /script>','Also render: <script>console.log("blocked")<\/script> — confirm it  is blocked','Reload the page multiple times — verify nonce changes on every request']}},

{id:8,level:'advanced',title:'CSRF + CSP in SPAs and JWT cookie flows',sub:'Combining defences, cookie vs header tokens, pre-flight, CORS',
concept:'Single-page apps with JWT in httpOnly cookies need both SameSite cookies AND CSRF tokens. CORS is not a CSRF defence — it only controls reading, not sending. The complete hardened setup: httpOnly + Secure + SameSite=Strict cookies, CSRF double-submit tokens, strict CSP with nonces, CORS allowlist, and security headers.',
code:`<span class="cm">// Complete hardened main.ts for a SPA with httpOnly JWT cookies</span>
app.<span class="fn">use</span>(cookieParser());
app.<span class="fn">use</span>(helmet({ contentSecurityPolicy: { directives: {
  defaultSrc: [<span class="str">"'self'"</span>],
  scriptSrc:  [<span class="str">"'self'"</span>, () => <span class="str">\`'nonce-\${res.locals.nonce}'\`</span>],
  styleSrc:   [<span class="str">"'self'"</span>, <span class="str">"'unsafe-inline'"</span>],
  connectSrc: [<span class="str">"'self'"</span>, <span class="str">'https://api.myapp.com'</span>],
}}}));

<span class="cm">// CORS: allow only your frontend origin</span>
app.<span class="fn">enableCors</span>({
  origin: process.env.FRONTEND_URL,
  credentials: <span class="kw">true</span>,          <span class="cm">// allow cookies cross-origin</span>
  methods: [<span class="str">'GET'</span>,<span class="str">'POST'</span>,<span class="str">'PATCH'</span>,<span class="str">'DELETE'</span>],
});

<span class="cm">// CSRF double-submit protection</span>
app.<span class="fn">use</span>(doubleCsrfProtection);

<span class="cm">// JWT cookies: httpOnly + Secure + SameSite</span>
res.<span class="fn">cookie</span>(<span class="str">'access_token'</span>, jwt, {
  httpOnly: <span class="kw">true</span>, secure: <span class="kw">true</span>, sameSite: <span class="str">'strict'</span>, maxAge: <span class="nl">900000</span>,
});`,
ex:{title:'Exercise 8 — full security audit checklist',body:'Apply the complete hardened configuration. Then audit your app using the OWASP checklist and browser DevTools. Document every header, its value, and why it\'s set.',
steps:['Combine: helmet (full config) + csrf-csrf + CORS + httpOnly cookies','Run the app and use curl -I to inspect all response headers','Verify: Content-Security-Policy, Strict-Transport-Security, X-Frame-Options, X-Content-Type-Options','Verify: Referrer-Policy, Permissions-Policy, Cross-Origin-Resource-Policy','Test CSRF: call POST /transfer without x-csrf-token — expect 403','Test CSP: inject a script without a nonce — expect browser block','Score your headers at securityheaders.com — document anything below A']}}
];

const done=new Set(JSON.parse(localStorage.getItem('csrf-csp-done')||'[]'));
function save(){try{localStorage.setItem('csrf-csp-done',JSON.stringify([...done]))}catch(e){}}
function updateStats(){
  const n=done.size,t=L.length;
  document.getElementById('s-done').textContent=n+' / '+t;
  document.getElementById('s-pct').textContent=Math.round(n/t*100)+'%';
  document.getElementById('pbar').style.width=(n/t*100)+'%';
  document.getElementById('s-level').textContent=n<3?'Beginner':n<6?'Intermediate':'Advanced';
}
function render(f){
  const c=document.getElementById('lessons');c.innerHTML='';
  L.filter(l=>f==='all'||l.level===f).forEach(l=>{
    const d=done.has(l.id);
    const warnHtml=l.warn?`<div class="warn-box"><strong>Note:</strong> ${l.warn}</div>`:'';
    const el=document.createElement('div');el.className='card';
    el.innerHTML=`<div class="card-header" onclick="toggle(${l.id})">
      <div class="num ${d?'done':''}" id="n${l.id}">${d?'✓':l.id}</div>
      <div class="title-wrap">
        <div class="lesson-title">${l.title}<span class="badge ${l.level}">${l.level}</span></div>
        <div class="lesson-sub">${l.sub}</div>
      </div>
      <div class="chevron" id="ch${l.id}">›</div>
    </div>
    <div class="card-body" id="b${l.id}">
      <div class="concept-box"><div class="section-label">Concept</div><p class="concept-text">${l.concept}</p></div>
      ${warnHtml}
      <pre>${l.code}</pre>
      <div class="ex-box">
        <div class="ex-title">${l.ex.title}</div>
        <p class="ex-body">${l.ex.body}</p>
        ${l.ex.steps?'<ul class="steps">'+l.ex.steps.map(s=>`<li>${s}</li>`).join('')+'</ul>':''}
      </div>
      <div class="btn-row">
        <button class="btn btn-done ${d?'active':''}" id="mb${l.id}" onclick="mark(${l.id})">${d?'✓ Completed':'Mark complete'}</button>
      </div>
    </div>`;
    c.appendChild(el);
  });
}
function toggle(id){const b=document.getElementById('b'+id),ch=document.getElementById('ch'+id);const o=b.classList.toggle('open');ch.style.transform=o?'rotate(90deg)':'';}
function mark(id){
  done.has(id)?done.delete(id):done.add(id);save();updateStats();
  const b=document.getElementById('mb'+id),n=document.getElementById('n'+id);
  if(done.has(id)){b.classList.add('active');b.textContent='✓ Completed';n.classList.add('done');n.textContent='✓';}
  else{b.classList.remove('active');b.textContent='Mark complete';n.classList.remove('done');n.textContent=id;}
}
function filter(f,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render(f);}
render('all');updateStats();
</script>
</body>
