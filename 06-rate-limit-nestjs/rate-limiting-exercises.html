    <script>
        const L = [
            {
                id: 1, level: 'beginner', title: 'Rate limiting algorithms compared', sub: 'Fixed window, sliding window, token bucket, leaky bucket',
                concept: 'Different algorithms make different tradeoffs between simplicity and accuracy. Fixed window is simplest but allows bursts at window boundaries. Sliding window is more accurate. Token bucket smooths burst traffic. Leaky bucket enforces a strict constant rate. @nestjs/throttler uses fixed window by default; Redis-backed implementations can do any of these.',
                algos: [
                    { name: 'Fixed window', desc: 'Count requests per fixed time slot (e.g. 100/min). Simple, but a burst at :59 and :01 of consecutive windows can double the effective rate.' },
                    { name: 'Sliding window', desc: 'Count requests in the rolling last N seconds. More accurate than fixed window. Slightly more expensive to compute.' },
                    { name: 'Token bucket', desc: 'Tokens refill at a fixed rate; each request consumes one. Allows controlled bursts up to bucket capacity. Most flexible.' },
                    { name: 'Leaky bucket', desc: 'Requests queue and process at a fixed rate regardless of burst. Guarantees constant throughput. Harshest for bursty legitimate traffic.' },
                ],
                code: `<span class="cm">// Which algorithm to pick?</span>
<span class="cm">// API endpoints (general)  → Fixed or sliding window</span>
<span class="cm">// Auth / login endpoints   → Fixed window (strict, simple)</span>
<span class="cm">// File upload / expensive  → Token bucket (allow brief bursts)</span>
<span class="cm">// Webhook delivery         → Leaky bucket (constant rate)</span>
<span class="cm">// @nestjs/throttler        → Fixed window (default)</span>
<span class="cm">// rate-limiter-flexible    → All four, Redis-backed</span>`,
                ex: {
                    title: 'Exercise 1 — understand the boundary burst problem', body: 'Demonstrate the fixed-window boundary burst: send 5 requests at t=59s, then 5 more at t=61s. With a 10-req/min limit, all 10 should succeed — but your "real" rate was 10 req in 2 seconds.',
                    steps: ['Write a small script that timestamps each request and measures actual throughput', 'Use a 10 req/min fixed window limit', 'Send 5 requests at second 59, then 5 at second 61 of the next window', 'Log the timestamps and compute: effective rate = 10 req / 2 sec = 5x the limit', 'Understand why sliding window or token bucket avoids this problem']
                }
            },

            {
                id: 2, level: 'beginner', title: '@nestjs/throttler — basic setup', sub: 'ThrottlerModule, ThrottlerGuard, @Throttle, @SkipThrottle',
                concept: '@nestjs/throttler is NestJS\'s built-in rate limiting module. Register it globally, apply ThrottlerGuard as an APP_GUARD, and every route is automatically protected. Use @Throttle() to override limits per route, and @SkipThrottle() to exempt public or internal routes.',
                code: `npm install @nestjs/throttler

<span class="cm">// app.module.ts</span>
<span class="kw">import</span> { <span class="cl">ThrottlerModule</span>, <span class="cl">ThrottlerGuard</span> } <span class="kw">from</span> <span class="str">'@nestjs/throttler'</span>;

<span class="dec">@Module</span>({
  imports: [
    <span class="cl">ThrottlerModule</span>.<span class="fn">forRoot</span>([{
      name: <span class="str">'global'</span>,
      ttl: <span class="nl">60000</span>,   <span class="cm">// window: 1 minute (ms)</span>
      limit: <span class="nl">100</span>,   <span class="cm">// max 100 requests per window</span>
    }]),
  ],
  providers: [
    { provide: <span class="cl">APP_GUARD</span>, useClass: <span class="cl">ThrottlerGuard</span> }, <span class="cm">// global</span>
  ],
})
<span class="kw">export class</span> <span class="cl">AppModule</span> {}

<span class="cm">// Override per-route</span>
<span class="dec">@Throttle</span>({ <span class="kw">default</span>: { limit: <span class="nl">5</span>, ttl: <span class="nl">60000</span> } })
<span class="dec">@Post</span>(<span class="str">'auth/login'</span>)
<span class="fn">login</span>() { ... }

<span class="cm">// Exempt health checks and internal routes</span>
<span class="dec">@SkipThrottle</span>()
<span class="dec">@Get</span>(<span class="str">'health'</span>)
<span class="fn">health</span>() { <span class="kw">return</span> { status: <span class="str">'ok'</span> }; }`,
                ex: {
                    title: 'Exercise 2 — global throttle with per-route overrides', body: 'Set a global limit of 20 req/min. Override POST /auth/login to 3 req/min. Override GET /health with @SkipThrottle(). Verify each with curl in a loop.',
                    steps: ['Install @nestjs/throttler and register ThrottlerModule.forRoot globally', 'Add { provide: APP_GUARD, useClass: ThrottlerGuard } to providers', 'Apply @Throttle({ default: { limit: 3, ttl: 60000 } }) to the login route', 'Apply @SkipThrottle() to GET /health', 'Run: for i in $(seq 1 25); do curl -s -o /dev/null -w "%{http_code}\\n" http://localhost:3000/api; done', 'Observe 200s followed by 429 Too Many Requests at request 21']
                }
            },

            {
                id: 3, level: 'beginner', title: 'Rate limit response headers', sub: 'X-RateLimit-Limit, X-RateLimit-Remaining, Retry-After',
                concept: 'Well-behaved APIs tell clients their rate limit status in response headers. Clients use these to implement backoff without guessing. @nestjs/throttler automatically sets X-RateLimit-Limit, X-RateLimit-Remaining, and X-RateLimit-Reset. On 429, it sets Retry-After so clients know when to retry.',
                code: `<span class="cm">// Headers sent automatically by ThrottlerGuard:</span>
<span class="cm">// X-RateLimit-Limit:     100    (your configured limit)</span>
<span class="cm">// X-RateLimit-Remaining: 87     (how many left in window)</span>
<span class="cm">// X-RateLimit-Reset:     1714320060  (unix timestamp of window reset)</span>
<span class="cm">// Retry-After:           45     (seconds until reset, only on 429)</span>

<span class="cm">// Custom ThrottlerGuard to add extra headers</span>
<span class="dec">@Injectable</span>()
<span class="kw">export class</span> <span class="cl">CustomThrottlerGuard</span> <span class="kw">extends</span> <span class="cl">ThrottlerGuard</span> {
  <span class="kw">protected async</span> <span class="fn">throwThrottlingException</span>(
    ctx: <span class="cl">ExecutionContext</span>,
    throttlerLimitDetail: <span class="cl">ThrottlerLimitDetail</span>,
  ) {
    <span class="kw">const</span> res = ctx.<span class="fn">switchToHttp</span>().<span class="fn">getResponse</span>();
    res.<span class="fn">set</span>(<span class="str">'Retry-After'</span>, Math.<span class="fn">ceil</span>(throttlerLimitDetail.timeToExpire / <span class="nl">1000</span>));
    <span class="kw">throw new</span> <span class="cl">HttpException</span>(
      { message: <span class="str">'Too many requests'</span>, retryAfter: throttlerLimitDetail.timeToExpire },
      <span class="nl">429</span>,
    );
  }
}`,
                ex: {
                    title: 'Exercise 3 — observe and parse rate limit headers', body: 'Hit a rate-limited endpoint in a loop. After each request, read and log the X-RateLimit-Remaining header. When you get 429, read Retry-After and implement automatic backoff.',
                    steps: ['Run the server with ThrottlerGuard globally applied', 'Write a script that hits GET /api 25 times', 'After each response, log the X-RateLimit-Remaining header value', 'When you receive 429, read the Retry-After header', 'Sleep for Retry-After seconds, then retry — confirm it succeeds', 'Extend CustomThrottlerGuard to include a JSON body with retryAfter in the 429 response']
                }
            },

            {
                id: 4, level: 'intermediate', title: 'Multiple throttle tiers per route', sub: 'Named throttlers, burst + sustained limits, layered defence',
                concept: 'Production APIs often need layered limits: a loose burst limit (10 req/5s) to handle legitimate spikes, plus a strict sustained limit (100 req/min) to prevent abuse. @nestjs/throttler supports multiple named throttlers simultaneously — a request must pass ALL of them.',
                code: `<span class="cm">// Define multiple named tiers</span>
<span class="cl">ThrottlerModule</span>.<span class="fn">forRoot</span>([
  {
    name: <span class="str">'burst'</span>,
    ttl: <span class="nl">5000</span>,    <span class="cm">// 5 second window</span>
    limit: <span class="nl">10</span>,    <span class="cm">// max 10 requests in a burst</span>
  },
  {
    name: <span class="str">'sustained'</span>,
    ttl: <span class="nl">60000</span>,   <span class="cm">// 1 minute window</span>
    limit: <span class="nl">100</span>,   <span class="cm">// max 100 per minute</span>
  },
])

<span class="cm">// Override individual tiers on a route</span>
<span class="dec">@Throttle</span>({
  burst: { limit: <span class="nl">3</span>, ttl: <span class="nl">5000</span> },       <span class="cm">// 3 per 5s</span>
  sustained: { limit: <span class="nl">20</span>, ttl: <span class="nl">60000</span> },  <span class="cm">// 20 per min</span>
})
<span class="dec">@Post</span>(<span class="str">'auth/login'</span>)
<span class="fn">login</span>() { ... }`,
                ex: {
                    title: 'Exercise 4 — burst vs sustained limiting', body: 'Configure two named throttlers: burst (10 req / 5s) and sustained (60 req / min). Apply stricter burst limits to POST /auth/login. Verify a flood of rapid requests is rejected by the burst limiter before hitting the sustained limit.',
                    steps: ['Define both burst and sustained throttlers in ThrottlerModule.forRoot', 'Apply default tiers globally via APP_GUARD', 'Override login with burst: { limit: 3, ttl: 5000 }', 'Test burst: send 5 rapid requests to /auth/login — request 4 gets 429', 'Wait 5 seconds — send 3 more — they should succeed (burst window reset)', 'Confirm sustained limit still applies: send 60 requests over a minute']
                }
            },

            {
                id: 5, level: 'intermediate', title: 'Redis-backed rate limiting with rate-limiter-flexible', sub: 'RateLimiterRedis, sliding window, per-user limits',
                concept: 'The default ThrottlerGuard stores counters in memory — they reset on every server restart and don\'t share state across multiple instances. For production (multiple pods, PM2 clusters), back the rate limiter with Redis. rate-limiter-flexible provides Redis-backed sliding window, token bucket, and per-consumer limits.',
                code: `npm install rate-limiter-flexible ioredis

<span class="cm">// rate-limiter.service.ts</span>
<span class="kw">import</span> { <span class="cl">RateLimiterRedis</span> } <span class="kw">from</span> <span class="str">'rate-limiter-flexible'</span>;
<span class="kw">import</span> <span class="cl">Redis</span> <span class="kw">from</span> <span class="str">'ioredis'</span>;

<span class="dec">@Injectable</span>()
<span class="kw">export class</span> <span class="cl">RateLimiterService</span> {
  <span class="kw">private</span> limiter: <span class="cl">RateLimiterRedis</span>;

  <span class="kw">constructor</span>() {
    <span class="kw">this</span>.limiter = <span class="kw">new</span> <span class="cl">RateLimiterRedis</span>({
      storeClient: <span class="kw">new</span> <span class="cl">Redis</span>(process.env.REDIS_URL),
      keyPrefix: <span class="str">'rl:api'</span>,
      points: <span class="nl">100</span>,          <span class="cm">// tokens</span>
      duration: <span class="nl">60</span>,         <span class="cm">// per 60 seconds (sliding)</span>
      blockDuration: <span class="nl">120</span>,   <span class="cm">// block for 2 min after exhaustion</span>
    });
  }

  <span class="kw">async</span> <span class="fn">consume</span>(key: string, points = <span class="nl">1</span>) {
    <span class="kw">return this</span>.limiter.<span class="fn">consume</span>(key, points); <span class="cm">// throws RateLimiterRes if exceeded</span>
  }
}`,
                ex: {
                    title: 'Exercise 5 — Redis-backed per-user sliding window', body: 'Replace the in-memory ThrottlerGuard on a high-traffic route with a Redis-backed RateLimiterRedis. Key by req.user.id (authenticated) or req.ip (anonymous). Restart the server and confirm counters persist.',

<span class="dec">@Injectable</span>()
<span class="kw">export class</span> <span class="cl">IpBanService</span> {
  <span class="kw">async</span> <span class="fn">recordViolation</span>(ip: string) {
    <span class="kw">const</span> violations = <span class="kw">await this</span>.redis.<span class="fn">incr</span>(<span class="str">\`violations:\${ip}\`</span>);
    <span class="kw">await this</span>.redis.<span class="fn">expire</span>(<span class="str">\`violations:\${ip}\`</span>, <span class="nl">3600</span>);

    <span class="cm">// Progressive penalty: 1→10s, 2→60s, 3→600s, 4+→86400s</span>
    <span class="kw">const</span> penalties = [<span class="nl">10</span>, <span class="nl">60</span>, <span class="nl">600</span>, <span class="nl">86400</span>];
    <span class="kw">const</span> duration = penalties[Math.<span class="fn">min</span>(violations - <span class="nl">1</span>, penalties.length - <span class="nl">1</span>)];

    <span class="kw">await this</span>.redis.<span class="fn">setex</span>(<span class="str">\`ban:\${ip}\`</span>, duration, <span class="str">'1'</span>);
    <span class="kw">return</span> { violations, bannedFor: duration };
  }

  <span class="kw">async</span> <span class="fn">isBanned</span>(ip: string): <span class="cl">Promise</span>&lt;boolean&gt; {
    <span class="kw">return</span> !!(<span class="kw">await this</span>.redis.<span class="fn">exists</span>(<span class="str">\`ban:\${ip}\`</span>));
  }
}`,

        const done = new Set(JSON.parse(localStorage.getItem('ratelimit-done') || '[]'));

        function updateStats() {
            const n = done.size, t = L.length;
            document.getElementById('s-done').textContent = n + ' / ' + t;
            document.getElementById('s-pct').textContent = Math.round(n / t * 100) + '%';

            const c = document.getElementById('lessons'); c.innerHTML = '';

                const d = done.has(l.id);

      </div>
    </div>`;
                c.appendChild(el);
            });

        function toggle(id) { const b = document.getElementById('b' + id), ch = document.getElementById('ch' + id); const o = b.classList.toggle('open'); ch.style.transform = o ? 'rotate(90deg)' : ''; }
        function mark(id) {
            done.has(id) ? done.delete(id) : done.add(id); save(); updateStats();
            const b = document.getElementById('mb' + id), n = document.getElementById('n' + id);
            if (done.has(id)) { b.classList.add('active'); b.textContent = '✓ Completed'; n.classList.add('done'); n.textContent = '✓'; }
            else { b.classList.remove('active'); b.textContent = 'Mark complete'; n.classList.remove('done'); n.textContent = id; }
        }
        function filter(f, el) { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); el.classList.add('active'); render(f); }
